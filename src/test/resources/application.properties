# 僅在「測試」放寬 bean 覆蓋。
# 原因:@SpringBootTest 載入 context 時,auditing 的 jpaAuditingHandler 等 bean 會被框架重複註冊
#       (log 顯示是 equivalent definition,定義完全相同),需放寬覆蓋才不會報 BeanDefinitionOverrideException。
# 正式環境(src/main/resources)維持 Spring Boot 預設(關閉)——所以 production code 若不小心同名 bean 仍會報錯。
spring.main.allow-bean-definition-overriding=true
